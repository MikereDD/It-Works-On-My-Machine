#--------------------------------------------
# file:     .tmux.conf
# author:   Mike Redd
# version:  1.0
# desc:     Minimal tmux (Arakiel)
#--------------------------------------------

# ── General ────────────────────────────────

set -g default-terminal "tmux-256color"
# Pass 24-bit truecolor through to vim (termguicolors / gruvbox).
# 'Tc' covers most terminals; 'RGB' is the standardized capability.
set -ag terminal-overrides ",*256col*:RGB"
set -g history-limit 10000

# Faster response
set -sg escape-time 0

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Keep path when splitting
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# ── Prefix (fix default garbage key) ───────

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ── Navigation (matches your i3 brain) ────

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Seamless vim <-> tmux navigation (christoomey/vim-tmux-navigator) ──
# C-h/j/k/l move between panes, but pass through to vim when the active
# pane is running vim (so vim splits and tmux panes feel like one thing).
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
# Restore clear-screen (C-l) under the prefix, since C-l is now taken.
bind C-l send-keys 'C-l'

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Mouse (optional, leave on for sanity) ─

set -g mouse on

# ── Status bar (match your i3 style) ──────

set -g status-position top
set -g status-interval 2

set -g status-style "bg=#191919 fg=#d8dee9"

set -g status-left ""
set -g status-right "#[fg=#81a1c1]#H #[fg=#d8dee9]| #[fg=#a3be8c]%H:%M"

# Window styling
setw -g window-status-format "#I:#W"
setw -g window-status-current-format "#[fg=#81a1c1]#I:#W"

# Pane borders
set -g pane-border-style "fg=#3b4252"
set -g pane-active-border-style "fg=#81a1c1"

# ── Clean look ────────────────────────────

set -g message-style "bg=#2e3440 fg=#eceff4"
set -g mode-style "bg=#434c5e fg=#eceff4"

# No bell nonsense
set -g visual-bell off
set -g bell-action none
